<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact & Support</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.6;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
      text-align: center;
    }
    h1 {
      color: #111;
      margin-bottom: 10px;
    }
    p {
      margin: 10px 0;
    }
    .card {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: #f7f7f7;
    }
    .email {
      font-size: 18px;
      font-weight: 600;
      margin-top: 10px;
    }

<h1>Contact & Support</h1>

<p>If you need help with the app, have feedback, or want to report an issue, feel free to reach out.</p>

<div class="card">
  <p><strong>Email Support</strong></p>
  <p class="email">
    <a href="mailto:sniffmatesupport@gmail.com">sniffmatesupport@gmail.com</a>
  </p>
</div>

<div class="card">
  <p><strong>Response Time</strong></p>
  <p>We typically respond within 24–48 hours.</p>
</div>

<div class="card">
  <p><strong>Helpful Info to Include</strong></p>
  <p>
    - App version<br/>
    - Device model<br/>
    - Description of the issue
  </p>
</div>

</body>
